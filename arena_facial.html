<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSUNAMI - Arena Facial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%); color: white; font-family: 'Segoe UI', sans-serif; min-height: 100vh; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(16, 185, 129, 0.1); }
        .camera-container { position: relative; width: 100%; max-width: 640px; margin: 0 auto; border-radius: 20px; overflow: hidden; border: 2px solid #10b981; box-shadow: 0 0 30px rgba(16, 185, 129, 0.2); background: #000; }
        video { width: 100%; height: auto; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; transform: scaleX(-1); }
        #overlayCanvas { display: block; }
        #tempCanvas { display: none; }
        .status-badge { background: rgba(0, 0, 0, 0.6); padding: 8px 16px; border-radius: 20px; font-size: 12px; text-transform: uppercase; border: 1px solid #10b981; }
        .log-container { height: 150px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 11px; }
        .log-entry { padding: 4px 8px; border-left: 2px solid #10b981; margin-bottom: 4px; background: rgba(255,255,255,0.02); }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #10b981; box-shadow: 0 0 15px #10b981; animation: scan 3s linear infinite; z-index: 10; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        #loadingOverlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); z-index: 100; }
    </style>
</head>
<body class="p-4 md:p-8" onload="iniciarSistema()">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <a href="arena.html" class="border border-emerald-500 text-emerald-500 px-4 py-2 rounded-lg text-xs font-bold hover:bg-emerald-500 hover:text-black transition">VOLTAR</a>
            <h1 class="text-xl md:text-2xl font-bold text-emerald-400 uppercase flex items-center"><i class="fas fa-expand mr-3"></i>Arena Facial</h1>
            <div class="status-badge" id="statusLabel">Iniciando...</div>
        </div>

        <div class="camera-container mb-6" id="videoWrapper">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlayCanvas"></canvas>
            <canvas id="tempCanvas"></canvas>
            <div class="scan-line"></div>
            <div id="loadingOverlay">
                <i class="fas fa-brain text-5xl text-emerald-500 animate-pulse mb-4"></i>
                <p id="loadingStatus" class="text-emerald-400 font-bold uppercase text-sm">Carregando Banco Facial...</p>
                <div class="w-48 h-1 bg-gray-800 rounded-full mt-4 overflow-hidden">
                    <div id="progressBar" class="w-0 h-full bg-emerald-500 transition-all duration-300"></div>
                </div>
            </div>
        </div>

        <div id="resultCard" class="glass p-6 rounded-2xl mb-6 text-center hidden border-2 border-emerald-500">
            <div class="text-emerald-400 text-5xl mb-2"><i class="fas fa-check-circle"></i></div>
            <h2 id="nomeAluno" class="text-2xl font-bold uppercase text-white">---</h2>
            <p class="text-emerald-400 text-xs font-bold uppercase">Presença Confirmada</p>
        </div>

        <div class="glass p-4 rounded-2xl border border-emerald-500/20">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-[10px] uppercase text-emerald-500 font-bold tracking-widest">Relatório de Escaneamento</h3>
                <span id="contadorAlunos" class="text-[9px] text-emerald-400">AGUARDANDO BANCO</span>
            </div>
            <div id="log" class="log-container"></div>
        </div>
    </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycby-23cMovuAZ0m6JouTueAara4JIYnAQVvRImBzhZWMh26gWhm0aB_KiFpRo2t2CcEQCA/exec";
        let faceMatcher = null;
        let isProcessing = false;
        let lastDetectedName = "";
        let detectionTimeout = null;

        async function iniciarSistema() {
            addLog("Inicializando Motores de IA...");
            try {
                await faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
                await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
                await faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/');
                
                addLog("IA Pronta. Baixando banco de dados...");
                await carregarBancoDados();
                await iniciarCamera();
            } catch (err) {
                addLog("ERRO CRÍTICO: " + err.message);
            }
        }

        async function carregarBancoDados() {
            try {
                const resposta = await fetch(URL_SCRIPT + "?getDados=alunos");
                const alunos = await resposta.json();
                const descriptors = [];
                const progresso = document.getElementById('progressBar');
                
                let validos = 0;
                for (let i = 0; i < alunos.length; i++) {
                    const aluno = alunos[i];
                    progresso.style.width = ((i + 1) / alunos.length * 100) + '%';
                    
                    if (aluno.face_data && aluno.face_data.length > 500) {
                        try {
                            const img = await faceapi.fetchImage(aluno.face_data);
                            const detection = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
                            if (detection) {
                                descriptors.push(new faceapi.LabeledFaceDescriptors(aluno.nome, [detection.descriptor]));
                                validos++;
                            }
                        } catch (e) { console.error("Erro no descriptor de: " + aluno.nome); }
                    }
                }

                if (descriptors.length > 0) {
                    faceMatcher = new faceapi.FaceMatcher(descriptors, 0.6);
                    document.getElementById('loadingOverlay').style.display = 'none';
                    document.getElementById('statusLabel').innerText = "Sistema Online";
                    document.getElementById('contadorAlunos').innerText = `${validos} ROSTOS SINCRONIZADOS`;
                    addLog("Banco facial carregado com sucesso.");
                } else {
                    addLog("Aviso: Nenhum aluno possui foto válida.");
                    document.getElementById('loadingStatus').innerText = "Nenhum rosto cadastrado.";
                }
            } catch (err) {
                addLog("Erro ao sincronizar banco.");
            }
        }

        async function iniciarCamera() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('overlayCanvas');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                video.srcObject = stream;
                
                video.addEventListener('play', () => {
                    const displaySize = { width: video.clientWidth, height: video.clientHeight };
                    faceapi.matchDimensions(canvas, displaySize);

                    setInterval(async () => {
                        if (isProcessing) return;

                        const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
                        const resizedDetections = faceapi.resizeResults(detections, displaySize);
                        
                        canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                        
                        if (detections.length > 0) {
                            const result = faceMatcher.findBestMatch(detections[0].descriptor);
                            
                            // Desenha caixa de detecção
                            const box = resizedDetections[0].detection.box;
                            const drawBox = new faceapi.draw.DrawBox(box, { label: result.label === 'unknown' ? 'Analizando...' : result.label });
                            drawBox.draw(canvas);

                            if (result.label !== 'unknown' && result.label !== lastDetectedName) {
                                registrarPresenca(result.label);
                            }
                        }
                    }, 200);
                });
            } catch (err) {
                addLog("Câmera bloqueada ou não encontrada.");
            }
        }

        async function registrarPresenca(nome) {
            isProcessing = true;
            lastDetectedName = nome;
            
            // Captura a foto do momento (OTIMIZADA)
            const video = document.getElementById('video');
            const tempCanvas = document.getElementById('tempCanvas');
            tempCanvas.width = 160;
            tempCanvas.height = 120;
            const ctx = tempCanvas.getContext('2d');
            ctx.translate(tempCanvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, 160, 120);
            const fotoPresenca = tempCanvas.toDataURL('image/jpeg', 0.4);

            document.getElementById('nomeAluno').innerText = nome;
            document.getElementById('resultCard').classList.remove('hidden');
            addLog(`RECONHECIDO: ${nome}`);

            try {
                const params = new URLSearchParams();
                params.append('action', 'presenca');
                params.append('nome', nome);
                params.append('foto', fotoPresenca); // ENVIA A FOTO CAPTURADA
                
                await fetch(URL_SCRIPT, { method: 'POST', body: params });
                addLog("Ponto e foto salvos na nuvem.");
            } catch (e) {
                addLog("Erro ao comunicar com o servidor.");
            }

            setTimeout(() => {
                document.getElementById('resultCard').classList.add('hidden');
                isProcessing = false;
                // Reset do nome após 10 segundos para permitir nova batida do mesmo aluno se necessário
                setTimeout(() => { lastDetectedName = ""; }, 10000);
            }, 4000);
        }

        function addLog(msg) {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
