<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSUNAMI - Arena Facial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%); color: white; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(16, 185, 129, 0.1); }
        
        /* Câmera container - INICIA OCULTO */
        .camera-box { 
            width: 200px; 
            height: 150px; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 2px solid #10b981; 
            position: relative;
            margin: 0 auto;
            background: #000;
            display: none; /* ← CÂMERA COMEÇA DESLIGADA */
        }
        .camera-box.ativo { display: block; }
        .camera-box video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* Efeitos de scan */
        .scan-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(16, 185, 129, 0.1) 50%, transparent 100%);
            animation: scan 2s linear infinite;
            pointer-events: none;
        }
        @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        
        .scan-corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #10b981;
        }
        .scan-corner.tl { top: 5px; left: 5px; border-right: 0; border-bottom: 0; }
        .scan-corner.tr { top: 5px; right: 5px; border-left: 0; border-bottom: 0; }
        .scan-corner.bl { bottom: 5px; left: 5px; border-right: 0; border-top: 0; }
        .scan-corner.br { bottom: 5px; right: 5px; border-left: 0; border-top: 0; }
        
        /* Lista de alunos - INICIA VISÍVEL */
        .aluno-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(16, 185, 129, 0.2); 
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .aluno-card:hover { background: rgba(16, 185, 129, 0.1); border-color: #10b981; }
        .aluno-card.marcado { 
            background: rgba(251, 191, 36, 0.2); 
            border-color: #fbbf24; /* Amarelo = Marcado escondido */
        }
        .aluno-card.reconhecido { 
            background: rgba(16, 185, 129, 0.3); 
            border-color: #10b981;
            pointer-events: none;
        }
        .aluno-card.nm { opacity: 0.4; pointer-events: none; }
        
        .foto-aluno {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(16, 185, 129, 0.3);
            flex-shrink: 0;
        }
        .foto-aluno.sem-foto {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #10b981;
            font-size: 24px;
        }
        
        /* Status de análise - INICIA OCULTO */
        .status-analise {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #10b981;
            text-align: center;
            display: none;
            z-index: 1000;
            max-width: 90%;
            width: 350px;
        }
        .status-analise.ativo { display: block; }
        
        .foto-analise {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #10b981;
            margin: 0 auto 20px;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.5);
        }
        
        .scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
            animation: scanner 2s linear infinite;
        }
        @keyframes scanner {
            0%, 100% { top: 0; }
            50% { top: 100%; }
        }
        
        /* Filtro de turma */
        .filtro-box { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); }
        
        /* Header */
        .header-facial { background: rgba(16, 185, 129, 0.1); border-bottom: 2px solid #10b981; }
        
        /* Resultado final */
        .resultado-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        .resultado-overlay.ativo { display: flex; }
        
        .foto-resultado {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #10b981;
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.6);
            margin-bottom: 20px;
            animation: pulseFoto 0.5s ease-out;
        }
        @keyframes pulseFoto {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        /* Instrução inicial */
        .instrucao-box {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body class="p-4">
    <script>if (sessionStorage.getItem('tsunami_logged') !== 'true') { window.location.href = 'login.html'; }</script>

    <div class="max-w-md mx-auto">
        <!-- HEADER -->
        <div class="header-facial p-4 rounded-t-2xl mb-4">
            <div class="flex justify-between items-center">
                <a href="arena.html" class="text-emerald-400 text-xs uppercase font-bold hover:text-emerald-300">
                    <i class="fas fa-arrow-left mr-1"></i>Voltar
                </a>
                <h1 class="text-lg font-bold text-emerald-400 uppercase tracking-wider">
                    <i class="fas fa-fingerprint mr-2"></i>Arena Facial
                </h1>
                <div class="w-16"></div>
            </div>
        </div>

        <!-- INSTRUÇÃO -->
        <div class="instrucao-box">
            <p class="text-[10px] text-emerald-400 uppercase">
                <i class="fas fa-hand-pointer mr-1"></i>
                Toque no aluno primeiro
            </p>
        </div>

        <!-- CÂMERA (COMEÇA DESLIGADA) -->
        <div class="glass p-4 rounded-2xl mb-4 text-center">
            <p class="text-[10px] uppercase text-gray-400 mb-3 tracking-widest" id="cameraStatus">
                Câmera aguardando...
            </p>
            
            <div class="camera-box" id="cameraBox">
                <video id="video" autoplay muted playsinline></video>
                <div class="scan-overlay"></div>
                <div class="scan-corner tl"></div>
                <div class="scan-corner tr"></div>
                <div class="scan-corner bl"></div>
                <div class="scan-corner br"></div>
            </div>
            
            <div class="mt-3 flex justify-center gap-2">
                <span class="text-[10px] text-emerald-400" id="sistemaStatus">● SISTEMA PRONTO</span>
                <span id="contadorRostos" class="text-[10px] text-gray-400">0 rostos</span>
            </div>
        </div>

        <!-- FILTRO DE TURMA -->
        <div class="filtro-box p-3 rounded-xl mb-4">
            <select id="filtroTurma" onchange="renderizar()" class="w-full bg-transparent text-emerald-400 text-sm outline-none">
                <option value="">TODAS AS TURMAS</option>
            </select>
        </div>

        <!-- LISTA DE ALUNOS -->
        <div class="mb-4">
            <h3 class="text-[10px] uppercase text-emerald-400 mb-3 tracking-widest flex justify-between">
                <span>Selecione o aluno</span>
                <span id="dataHoje" class="text-gray-400"></span>
            </h3>
            
            <div id="listaAlunos" class="space-y-3">
                <p class="text-center text-gray-500 py-8 text-sm">Carregando...</p>
            </div>
        </div>

        <!-- STATUS DE ANÁLISE -->
        <div id="statusAnalise" class="status-analise">
            <div style="position: relative; display: inline-block;">
                <img id="fotoAnalise" class="foto-analise" src="" alt="">
                <div class="scanner-line" style="position: absolute; inset: 0; border-radius: 50%; overflow: hidden; pointer-events: none;"></div>
            </div>
            <h3 class="text-emerald-400 font-bold uppercase text-lg mb-1">Analisando Biometria...</h3>
            <p id="nomeAnalisado" class="text-white text-sm font-bold">---</p>
            <div class="mt-3 w-48 h-1 bg-gray-800 rounded-full overflow-hidden mx-auto">
                <div class="h-full bg-emerald-500 animate-pulse" style="width: 100%"></div>
            </div>
            <p class="text-[10px] text-gray-400 mt-2">Comparando pontos faciais...</p>
        </div>

        <!-- RESULTADO FINAL -->
        <div id="resultadoOverlay" class="resultado-overlay">
            <img id="fotoResultado" class="foto-resultado" src="" alt="">
            <div class="text-emerald-400 text-5xl mb-2">
                <i class="fas fa-check-circle"></i>
            </div>
            <h2 id="nomeReconhecido" class="text-2xl font-bold uppercase text-white mb-1">---</h2>
            <p class="text-emerald-400 text-sm font-bold uppercase">✓ Biometria Confirmada</p>
            <p class="text-[10px] text-gray-400 mt-2">Match: 98.7%</p>
            <p class="text-[10px] text-emerald-400 mt-1">Presença registrada às <span id="horaRegistro"></span></p>
            <button onclick="fecharResultado()" class="mt-6 px-6 py-2 border border-emerald-500 text-emerald-400 rounded-full text-xs uppercase font-bold hover:bg-emerald-500 hover:text-black transition">
                Próximo Aluno
            </button>
        </div>
    </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycby-23cMovuAZ0m6JouTueAara4JIYnAQVvRImBzhZWMh26gWhm0aB_KiFpRo2t2CcEQCA/exec";
        
        let alunos = JSON.parse(localStorage.getItem('tsunami_alunos')) || [];
        let turmas = JSON.parse(localStorage.getItem('tsunami_turmas')) || [];
        let freq = JSON.parse(localStorage.getItem('tsunami_freq')) || {};
        let ordens = JSON.parse(localStorage.getItem('tsunami_ordens')) || {};
        let dataAtual = new Date();
        let lista = [];
        let stream = null;
        let alunoSelecionado = null; // Guarda aluno marcado

        // ========== INICIALIZAÇÃO ==========
        function inicializar() {
            document.getElementById('dataHoje').textContent = new Date().toLocaleDateString('pt-BR');
            carregarTurmas();
            sincronizarDados();
        }

        // ========== CÂMERA ==========
        async function ligarCamera() {
            const cameraBox = document.getElementById('cameraBox');
            const statusText = document.getElementById('cameraStatus');
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 320 },
                        height: { ideal: 240 },
                        facingMode: "user"
                    } 
                });
                document.getElementById('video').srcObject = stream;
                cameraBox.classList.add('ativo');
                statusText.textContent = "Câmera ativa - Posicione o rosto";
                statusText.classList.add('text-emerald-400');
                statusText.classList.remove('text-gray-400');
                return true;
            } catch (err) {
                console.log("Câmera não disponível");
                return false;
            }
        }

        function desligarCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            document.getElementById('cameraBox').classList.remove('ativo');
            document.getElementById('cameraStatus').textContent = "Câmera aguardando...";
            document.getElementById('cameraStatus').classList.remove('text-emerald-400');
            document.getElementById('cameraStatus').classList.add('text-gray-400');
        }

        // ========== CARREGAR TURMAS ==========
        function carregarTurmas() {
            const sel = document.getElementById('filtroTurma');
            sel.innerHTML = '<option value="">TODAS AS TURMAS</option>';
            turmas.forEach(t => {
                if(t.nome) sel.innerHTML += `<option value="${t.nome}">${t.nome}</option>`;
            });
        }

        // ========== SINCRONIZAR DADOS ==========
        async function sincronizarDados() {
            try {
                const [rA, rT, rF] = await Promise.all([
                    fetch(URL_SCRIPT + '?getDados=alunos').then(r => r.json()),
                    fetch(URL_SCRIPT + '?getDados=turmas').then(r => r.json()),
                    fetch(URL_SCRIPT + '?getDados=frequencia').then(r => r.json())
                ]);
                
                if (Array.isArray(rA)) {
                    alunos = rA;
                    localStorage.setItem('tsunami_alunos', JSON.stringify(alunos));
                }
                if (Array.isArray(rT)) {
                    turmas = rT;
                    localStorage.setItem('tsunami_turmas', JSON.stringify(turmas));
                    carregarTurmas();
                }
                if (Array.isArray(rF)) {
                    freq = {};
                    ordens = {};
                    rF.forEach(f => {
                        const dataISO = getISOString(f.data_aula);
                        if (dataISO) {
                            const k = chave(f.nome, dataISO);
                            freq[k] = SIGLAS[f.status] || '';
                            if (f.justificativa) freq[k + '-txt'] = f.justificativa;
                            if (f.hora) ordens[k] = f.hora;
                        }
                    });
                    localStorage.setItem('tsunami_freq', JSON.stringify(freq));
                    localStorage.setItem('tsunami_ordens', JSON.stringify(ordens));
                }
                
                const comFoto = alunos.filter(a => a.face_data && a.face_data.length > 100).length;
                document.getElementById('contadorRostos').textContent = `${comFoto} rostos`;
                
                renderizar();
            } catch(e) {
                const comFoto = alunos.filter(a => a.face_data && a.face_data.length > 100).length;
                document.getElementById('contadorRostos').textContent = `${comFoto} rostos`;
                renderizar();
            }
        }

        // ========== FUNÇÕES UTILITÁRIAS ==========
        function getISOString(data) {
            if (!data) return null;
            let d;
            if (typeof data === 'string') {
                const dataLimpa = data.split(' ')[0];
                if (dataLimpa.includes('/')) {
                    const [dia, mes, ano] = dataLimpa.split('/').map(Number);
                    d = new Date(ano, mes - 1, dia);
                } else { d = new Date(data); }
            } else if (data instanceof Date) { d = data; }
            else { return null; }
            if (isNaN(d.getTime())) return null;
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }

        function chave(nome, dataISO) { return (nome.trim().toUpperCase() + '|' + dataISO); }

        function ativo(aluno, dataISO) {
            const mat = getISOString(aluno.matricula_rematricula);
            const ven = getISOString(aluno.data_vencimento);
            if (!mat || !ven) return true;
            return dataISO >= mat && dataISO <= ven;
        }

        const SIGLAS = {'Presente':'P', 'Atraso':'A', 'Faltou':'F', 'Justificado':'J'};
        const TEXTO = {'P':'Presente','A':'Atraso','F':'Faltou','J':'Justificado'};

        // ========== RENDERIZAR LISTA ==========
        function renderizar() {
            const hoje = getISOString(new Date());
            const filtro = document.getElementById('filtroTurma').value;
            
            lista = alunos.filter(a => ativo(a, hoje)).sort((a,b) => a.nome.localeCompare(b.nome));
            if (filtro) lista = lista.filter(a => a.turma === filtro);

            const container = document.getElementById('listaAlunos');
            
            if (lista.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-500 py-8">Nenhum aluno ativo hoje</p>`;
                return;
            }

            container.innerHTML = lista.map((aluno, idx) => {
                const k = chave(aluno.nome, hoje);
                const statusAtual = freq[k] || '';
                const jaMarcado = statusAtual === 'P' || statusAtual === 'A';
                const naoMatriculado = !ativo(aluno, hoje);
                
                let classe = 'aluno-card';
                if (naoMatriculado) classe += ' nm';
                else if (jaMarcado) classe += ' reconhecido';
                
                const temFoto = aluno.face_data && aluno.face_data.length > 100;
                const fotoHtml = temFoto 
                    ? `<img src="${aluno.face_data}" class="foto-aluno" alt="${aluno.nome}">`
                    : `<div class="foto-aluno sem-foto"><i class="fas fa-user"></i></div>`;
                
                const statusHtml = jaMarcado 
                    ? `<span class="text-[10px] text-emerald-400"><i class="fas fa-check-circle mr-1"></i>${TEXTO[statusAtual]}</span>`
                    : `<span class="text-[10px] text-gray-500"><i class="fas fa-fingerprint mr-1"></i>Aguardando</span>`;
                
                return `
                <div class="${classe}" onclick="iniciarProcesso(${idx})" id="card-${idx}">
                    ${fotoHtml}
                    <div class="flex-1">
                        <h4 class="font-bold text-emerald-300 uppercase text-sm">${aluno.nome}</h4>
                        <p class="text-[10px] text-gray-400">${aluno.turma || 'Sem turma'}</p>
                    </div>
                    <div id="status-${idx}">${statusHtml}</div>
                </div>`;
            }).join('');
        }

        // ========== NOVO FLUXO: TOQUE → MARCA → ESPERA → ENGANA ==========
        async function iniciarProcesso(idx) {
            const aluno = lista[idx];
            const hoje = getISOString(new Date());
            const card = document.getElementById(`card-${idx}`);
            
            // Verifica se já não está marcado
            const k = chave(aluno.nome, hoje);
            if (freq[k] === 'P' || freq[k] === 'A') {
                mostrarResultado(aluno, true);
                return;
            }
            
            // 1. MARCA PRESENÇA IMEDIATAMENTE (escondido)
            const agora = new Date();
            const hStr = agora.getHours().toString().padStart(2,'0') + ':' + 
                        agora.getMinutes().toString().padStart(2,'0') + ':' + 
                        agora.getSeconds().toString().padStart(2,'0');
            
            freq[k] = 'P';
            ordens[k] = hStr;
            localStorage.setItem('tsunami_freq', JSON.stringify(freq));
            localStorage.setItem('tsunami_ordens', JSON.stringify(ordens));
            
            // Atualiza visual para "marcado" (amarelo)
            card.classList.add('marcado');
            document.getElementById(`status-${idx}`).innerHTML = 
                `<span class="text-[10px] text-yellow-400"><i class="fas fa-clock mr-1"></i>Processando...</span>`;
            
            // Guarda aluno para o teatro
            alunoSelecionado = { aluno, hora: hStr, idx };
            
            // 2. DELAY DE 5-7 SEGUNDOS (você aponta a câmera)
            const delayEspera = 5000 + Math.random() * 2000; // 5-7 segundos aleatório
            await new Promise(r => setTimeout(r, delayEspera));
            
            // 3. LIGA A CÂMERA E FAZ O TEATRO
            await fazerTeatro();
            
            // Sincroniza em background
            sincronizarPresenca(aluno.nome, hoje, 'P', hStr);
        }

        async function fazerTeatro() {
            if (!alunoSelecionado) return;
            
            const { aluno, hora, idx } = alunoSelecionado;
            const card = document.getElementById(`card-${idx}`);
            
            // Liga câmera
            const cameraLigou = await ligarCamera();
            
            // Prepara tela de análise
            const temFoto = aluno.face_data && aluno.face_data.length > 100;
            if (temFoto) {
                document.getElementById('fotoAnalise').src = aluno.face_data;
                document.getElementById('fotoAnalise').style.display = 'block';
            } else {
                document.getElementById('fotoAnalise').style.display = 'none';
            }
            document.getElementById('nomeAnalisado').textContent = aluno.nome;
            
            // Mostra "Analisando..."
            document.getElementById('statusAnalise').classList.add('ativo');
            
            // Delay de análise 1.5s
            await new Promise(r => setTimeout(r, 1500));
            
            // Esconde análise
            document.getElementById('statusAnalise').classList.remove('ativo');
            
            // Mostra resultado
            mostrarResultado(aluno, false, hora);
            
            // Atualiza card para verde
            card.classList.remove('marcado');
            card.classList.add('reconhecido');
            document.getElementById(`status-${idx}`).innerHTML = 
                `<span class="text-[10px] text-emerald-400"><i class="fas fa-check-circle mr-1"></i>Presente</span>`;
        }

        function mostrarResultado(aluno, jaMarcado, hora) {
            const overlay = document.getElementById('resultadoOverlay');
            const temFoto = aluno.face_data && aluno.face_data.length > 100;
            
            if (temFoto) {
                document.getElementById('fotoResultado').src = aluno.face_data;
                document.getElementById('fotoResultado').style.display = 'block';
            } else {
                document.getElementById('fotoResultado').style.display = 'none';
            }
            
            document.getElementById('nomeReconhecido').textContent = aluno.nome;
            document.getElementById('horaRegistro').textContent = hora || new Date().toLocaleTimeString('pt-BR');
            
            overlay.classList.add('ativo');
            
            // Desliga câmera após mostrar resultado
            setTimeout(() => {
                desligarCamera();
            }, 500);
            
            // Auto-fecha após 4 segundos
            setTimeout(() => {
                if (overlay.classList.contains('ativo')) {
                    fecharResultado();
                }
            }, 4000);
        }

        function fecharResultado() {
            document.getElementById('resultadoOverlay').classList.remove('ativo');
            alunoSelecionado = null;
        }

        // ========== SINCRONIZAR COM PLANILHA ==========
        async function sincronizarPresenca(nome, dataISO, status, hora) {
            const fd = new FormData();
            fd.append('action', 'frequencia');
            fd.append('nome', nome);
            fd.append('data_aula', dataISO.split('-').reverse().join('/'));
            fd.append('status', TEXTO[status]);
            fd.append('justificativa', '');
            fd.append('hora', hora);
            
            try { 
                await fetch(URL_SCRIPT, {method:'POST', body:fd});
            } catch(e) {}
        }

        // Inicia
        inicializar();
    </script>
</body>
</html>
