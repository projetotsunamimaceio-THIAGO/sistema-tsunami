<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSUNAMI - Arena Facial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%); color: white; font-family: 'Segoe UI', sans-serif; min-height: 100vh; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(16, 185, 129, 0.1); }
        .camera-container { position: relative; width: 100%; max-width: 640px; margin: 0 auto; border-radius: 20px; overflow: hidden; border: 2px solid #10b981; box-shadow: 0 0 30px rgba(16, 185, 129, 0.2); background: #000; }
        video { width: 100%; height: auto; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; transform: scaleX(-1); }
        .status-badge { background: rgba(0, 0, 0, 0.6); padding: 8px 16px; border-radius: 20px; font-size: 12px; text-transform: uppercase; border: 1px solid #10b981; }
        .log-container { height: 150px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 11px; }
        .log-entry { padding: 4px 8px; border-left: 2px solid #10b981; margin-bottom: 4px; background: rgba(255,255,255,0.02); }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #10b981; box-shadow: 0 0 15px #10b981; animation: scan 3s linear infinite; z-index: 10; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        #loadingOverlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.95); z-index: 100; }
    </style>
</head>
<body class="p-4 md:p-8" onload="iniciarSistema()">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <a href="arena.html" class="border border-emerald-500 text-emerald-500 px-4 py-2 rounded-lg text-xs font-bold hover:bg-emerald-500 hover:text-black transition">VOLTAR</a>
            <h1 class="text-xl md:text-2xl font-bold text-emerald-400 uppercase flex items-center"><i class="fas fa-expand mr-3"></i>Arena Facial</h1>
            <div class="status-badge" id="statusLabel">Iniciando...</div>
        </div>

        <div class="camera-container mb-6" id="videoWrapper">
            <video id="video" autoplay muted playsinline></video>
            <div class="scan-line"></div>
            <div id="loadingOverlay">
                <i class="fas fa-brain text-5xl text-emerald-500 animate-pulse mb-4"></i>
                <p id="loadingStatus" class="text-emerald-400 font-bold uppercase text-sm">Carregando Banco de Dados...</p>
                <div class="w-48 h-1 bg-gray-800 rounded-full mt-4 overflow-hidden">
                    <div id="progressBar" class="w-0 h-full bg-emerald-500 transition-all duration-300"></div>
                </div>
            </div>
        </div>

        <div id="resultCard" class="glass p-6 rounded-2xl mb-6 text-center hidden border-2 border-emerald-500">
            <div class="text-emerald-400 text-5xl mb-2"><i class="fas fa-check-circle"></i></div>
            <h2 id="nomeAluno" class="text-2xl font-bold uppercase text-white">---</h2>
            <p class="text-emerald-400 text-xs font-bold uppercase">Presença Confirmada</p>
        </div>

        <div class="glass p-4 rounded-2xl border border-emerald-500/20">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-[10px] uppercase text-emerald-500 font-bold tracking-widest">Console do Sistema</h3>
                <span id="contadorAlunos" class="text-[9px] text-emerald-400">0 ROSTOS MAPEADOS</span>
            </div>
            <div id="log" class="log-container"></div>
        </div>
    </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycby-23cMovuAZ0m6JouTueAara4JIYnAQVvRImBzhZWMh26gWhm0aB_KiFpRo2t2CcEQCA/exec";
        let faceMatcher = null;
        let isProcessing = false;
        let lastIdentified = "";

        function systemLog(msg, type = 'info') {
            const logEl = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.style.color = type === 'success' ? '#10b981' : (type === 'error' ? '#f43f5e' : '#94a3b8');
            entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.prepend(entry);
        }

        async function iniciarSistema() {
            try {
                const progressBar = document.getElementById('progressBar');
                systemLog("Carregando modelos AI...");
                
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);

                progressBar.style.width = "30%";
                systemLog("Buscando dados da planilha...");
                
                const response = await fetch(URL_SCRIPT + '?getDados=alunos');
                const alunos = await response.json();
                
                systemLog(`${alunos.length} registros encontrados. Mapeando fotos...`);
                
                const labeledDescriptors = [];
                const batchSize = 10; // Processa de 10 em 10 para não travar o Chrome

                for (let i = 0; i < alunos.length; i += batchSize) {
                    const batch = alunos.slice(i, i + batchSize);
                    await Promise.all(batch.map(async (aluno) => {
                        if (aluno.face_data && aluno.face_data.length > 500) {
                            try {
                                const img = new Image();
                                img.src = aluno.face_data;
                                await img.decode(); // Método moderno e rápido para carregar imagem

                                const detection = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                                if (detection) {
                                    labeledDescriptors.push(new faceapi.LabeledFaceDescriptors(aluno.nome, [detection.descriptor]));
                                }
                            } catch (e) { console.warn("Erro no aluno: " + aluno.nome); }
                        }
                    }));
                    
                    let progresso = 30 + (i / alunos.length * 70);
                    progressBar.style.width = progresso + "%";
                    document.getElementById('contadorAlunos').textContent = `${labeledDescriptors.length} ROSTOS MAPEADOS`;
                }

                if (labeledDescriptors.length > 0) {
                    faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.55);
                    systemLog("Reconhecimento pronto!", 'success');
                    document.getElementById('loadingOverlay').style.display = 'none';
                    document.getElementById('statusLabel').textContent = "ONLINE";
                    startVideo();
                } else {
                    throw new Error("Nenhum rosto válido encontrado na planilha.");
                }
            } catch (err) {
                systemLog(err.message, 'error');
                document.getElementById('loadingStatus').textContent = "ERRO: FOTOS INVÁLIDAS";
            }
        }

        async function startVideo() {
            const video = document.getElementById('video');
            const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
            video.srcObject = stream;
            
            video.onplay = () => {
                const canvas = faceapi.createCanvasFromMedia(video);
                document.getElementById('videoWrapper').append(canvas);
                const displaySize = { width: video.clientWidth, height: video.clientHeight };
                faceapi.matchDimensions(canvas, displaySize);

                setInterval(async () => {
                    if (isProcessing) return;
                    const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptors();
                    const resizedDetections = faceapi.resizeResults(detections, displaySize);
                    
                    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                    
                    resizedDetections.forEach(detection => {
                        const result = faceMatcher.findBestMatch(detection.descriptor);
                        if (result.label !== 'unknown' && result.label !== lastIdentified) {
                            registrarPresenca(result.label);
                        }
                    });
                }, 600);
            };
        }

        async function registrarPresenca(nome) {
            isProcessing = true;
            lastIdentified = nome;
            document.getElementById('nomeAluno').textContent = nome;
            document.getElementById('resultCard').classList.remove('hidden');
            
            try {
                const params = new URLSearchParams();
                params.append('action', 'presenca');
                params.append('nome', nome);
                await fetch(URL_SCRIPT, { method: 'POST', body: params });
                systemLog(`PRESENÇA: ${nome}`, 'success');
            } catch (e) { systemLog("Erro ao salvar", 'error'); }

            setTimeout(() => {
                document.getElementById('resultCard').classList.add('hidden');
                isProcessing = false;
                lastIdentified = "";
            }, 5000);
        }
    </script>
</body>
</html>
