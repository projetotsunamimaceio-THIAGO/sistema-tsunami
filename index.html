<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSUNAMI - Gestão</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #07080f;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        /* subtle animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        header, main, footer { position: relative; z-index: 1; }

        /* ── HEADER ── */
        header { text-align: center; margin-bottom: 3rem; }

        .logo-wrap {
            display: inline-block;
            position: relative;
            margin-bottom: 1.5rem;
        }

        .logo-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(0,255,255,0.6);
            display: block;
        }

        .logo-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1px solid rgba(0,255,255,0.15);
            animation: spin 12s linear infinite;
        }

        .logo-ring::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00ffff;
            box-shadow: 0 0 8px #00ffff;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .brand-title {
            font-size: clamp(2.8rem, 8vw, 5rem);
            font-weight: 800;
            letter-spacing: 0.25em;
            color: #00ffff;
            text-shadow: 0 0 40px rgba(0,255,255,0.25), 0 0 80px rgba(0,255,255,0.1);
            line-height: 1;
        }

        .brand-sub {
            margin-top: 0.5rem;
            font-size: 0.65rem;
            letter-spacing: 0.45em;
            color: rgba(0,255,255,0.5);
            text-transform: uppercase;
        }

        .brand-line {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00ffff, transparent);
            margin: 0.75rem auto 0;
        }

        /* ── GRID ── */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            width: 100%;
            max-width: 700px;
        }

        .nav-card {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.6rem;
            padding: 1.25rem 1.25rem 1.1rem;
            border-radius: 12px;
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(255,255,255,0.06);
            text-decoration: none;
            transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--accent);
            opacity: 0.7;
            border-radius: 12px 12px 0 0;
            transition: opacity 0.18s;
        }

        .nav-card:hover {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.12);
        }

        .nav-card:hover::after { opacity: 1; }

        .card-icon {
            font-size: 1.4rem;
            color: var(--accent);
            line-height: 1;
        }

        .card-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            opacity: 0.9;
        }

        .card-arrow {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.15);
            transition: color 0.18s, transform 0.18s;
        }

        .nav-card:hover .card-arrow {
            color: var(--accent);
            transform: translate(2px, -2px);
        }

        /* accent colors per card */
        .c-cyan   { --accent: #00e5ff; }
        .c-fuchsia { --accent: #e040fb; }
        .c-violet { --accent: #b39ddb; }
        .c-emerald { --accent: #00e676; }
        .c-blue   { --accent: #448aff; }

        /* ── FOOTER ── */
        footer { margin-top: 2.5rem; }

        .logout-btn {
            background: none;
            border: none;
            color: rgba(239,83,80,0.55);
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: color 0.15s;
        }

        .logout-btn:hover { color: #ef5350; }
    </style>
</head>
<body>
    <script>
        if (sessionStorage.getItem('tsunami_logged') !== 'true') { window.location.href = 'login.html'; }
        function logout() { sessionStorage.removeItem('tsunami_logged'); window.location.href = 'login.html'; }
    </script>

    <header>
        <div class="logo-wrap">
            <img src="logo.png" alt="Logo Tsunami" class="logo-img"
                 onerror="this.src='https://via.placeholder.com/110/07080f/00ffff?text=T'">
            <span class="logo-ring"></span>
        </div>
        <div class="brand-title">TSUNAMI</div>
        <div class="brand-sub">Frequência &amp; Gestão</div>
        <div class="brand-line"></div>
    </header>

    <main>
        <div class="nav-grid">

            <a href="turmas.html" class="nav-card c-cyan">
                <i class="fas fa-users-cog card-icon"></i>
                <span class="card-label">Turmas</span>
                <i class="fas fa-arrow-up-right card-arrow"></i>
            </a>

            <a href="alunos.html" class="nav-card c-fuchsia">
                <i class="fas fa-user-plus card-icon"></i>
                <span class="card-label">Alunos</span>
                <i class="fas fa-arrow-up-right card-arrow"></i>
            </a>

            <a href="relatorio.html" class="nav-card c-violet">
                <i class="fas fa-chart-pie card-icon"></i>
                <span class="card-label">Relatórios</span>
                <i class="fas fa-arrow-up-right card-arrow"></i>
            </a>

            <a href="arena.html" class="nav-card c-emerald">
                <i class="fas fa-check-double card-icon"></i>
                <span class="card-label">Arena</span>
                <i class="fas fa-arrow-up-right card-arrow"></i>
            </a>

            <a href="arena_facial.html" class="nav-card c-blue">
                <i class="fas fa-camera card-icon"></i>
                <span class="card-label">Facial Arena</span>
                <i class="fas fa-arrow-up-right card-arrow"></i>
            </a>

        </div>
    </main>

    <footer>
        <button class="logout-btn" onclick="logout()">Sair do sistema</button>
    </footer>
</body>
</html>
